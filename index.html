<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX - Spatial Encased Portal</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050505; 
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { 
            display: block; 
        }
        #input_video { 
            display: none; 
        }
        
        /* UI Layer - Bloquea la interacción hasta dar clic */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: #FDCC0D; /* SGX Yellow */
            z-index: 20;
            backdrop-filter: blur(5px);
            transition: opacity 0.5s ease;
        }
        .start-box {
            background: rgba(50, 82, 123, 0.9); /* SGX Blue */
            border: 2px solid #FDCC0D;
            padding: 30px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(253, 204, 13, 0.4);
            max-width: 400px;
        }
        button.sgx-btn {
            background: #FDCC0D;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
        }
        button.sgx-btn:hover {
            background: #fff;
            box-shadow: 0 0 15px #FDCC0D;
        }
        #hud-data {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #FDCC0D;
            font-size: 0.8rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }

        /* Lil-GUI SGX Custom Theme Override */
        .lil-gui { 
            --background-color: rgba(17, 17, 17, 0.9);
            --text-color: #FDCC0D;
            --title-background-color: #32527B;
            --widget-color: #333;
            --hover-color: #444;
            --focus-color: #FDCC0D;
            --number-color: #fff;
            --string-color: #fff;
            font-family: 'Courier New', Courier, monospace;
            z-index: 15;
            position: absolute;
            top: 10px;
            right: 10px;
            display: none; /* Hidden until started */
        }
    </style>
    <!-- Three.js Base -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- MediaPipe FaceMesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <!-- Lil-GUI para Controles Interactivos -->
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>
</head>
<body>

    <video id="input_video" autoplay playsinline></video>
    
    <div id="scene-container"></div>

    <div id="ui-layer">
        <div class="start-box">
            <h2>SGX SPATIAL PORTAL</h2>
            <p style="color: #fff; font-size: 0.9rem;">
                Esta experiencia requiere tracking facial para crear la ilusión de profundidad (Parallax 3D).
            </p>
            <button id="start-btn" class="sgx-btn">INICIAR SENSOR ÓPTICO</button>
            <p id="loading-msg" style="display: none; color: #fff; margin-top: 15px; font-size: 0.8rem;">
                Cargando Asset y Motor IA...
            </p>
        </div>
    </div>
    
    <div id="hud-data" style="display: none;">TARGET X: 0.00 | TARGET Y: 0.00</div>

    <script>
        // ==========================================
        // 0. CONTROLADOR DE ESTADO GLOBAL (CONFIG)
        // ==========================================
        const SGXConfig = {
            // Parallax Engine
            tipoParallax: 'Portal (Físico)', // Control Maestro de Dirección
            depthMultiplierX: 3.5,
            depthMultiplierY: 2.5,
            lerpFactor: 0.12,
            invertX: true,  // Corrección nativa de cámara X
            invertY: true,  // Corrección nativa de cámara Y
            
            // Spatial Boundary (Box)
            boxWidth: 10,
            boxHeight: 8,
            boxDepth: 8,
            
            // Environment & Camera
            cameraZ: 8,
            gridColor: 0xFDCC0D,
            gridBg: 0x32527B,
            lightIntensity: 0.8,

            // Acciones
            resetView: function() {
                targetX = 0; targetY = 0;
                currentX = 0; currentY = 0;
            }
        };

        // ==========================================
        // 1. ARQUITECTURA THREE.JS
        // ==========================================
        const container = document.getElementById('scene-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = SGXConfig.cameraZ;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // Iluminación
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, SGXConfig.lightIntensity);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, SGXConfig.lightIntensity);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // ==========================================
        // 2. LA CAJA DE CONTENCIÓN (BOUNDARY BOX) DINÁMICA
        // ==========================================
        let room, gridFloor, gridCeil;

        function buildEncasedRoom() {
            // Limpiar geometrías previas si existen (Evita Memory Leaks)
            if (room) {
                room.geometry.dispose();
                scene.remove(room);
            }
            if (gridFloor) {
                scene.remove(gridFloor);
            }
            if (gridCeil) {
                scene.remove(gridCeil);
            }

            // Crear Habitación
            const roomGeo = new THREE.BoxGeometry(SGXConfig.boxWidth, SGXConfig.boxHeight, SGXConfig.boxDepth);
            const roomMat = new THREE.MeshStandardMaterial({
                color: 0x111111,
                side: THREE.BackSide,
                roughness: 0.8,
                metalness: 0.2
            });
            room = new THREE.Mesh(roomGeo, roomMat);
            scene.add(room);

            // Rejilla base (Floor Grid)
            gridFloor = new THREE.GridHelper(SGXConfig.boxWidth, Math.floor(SGXConfig.boxWidth * 2), SGXConfig.gridColor, SGXConfig.gridBg);
            gridFloor.position.y = -SGXConfig.boxHeight / 2 + 0.01; 
            scene.add(gridFloor);

            // Rejilla de techo
            gridCeil = new THREE.GridHelper(SGXConfig.boxWidth, Math.floor(SGXConfig.boxWidth * 2), SGXConfig.gridColor, SGXConfig.gridBg);
            gridCeil.position.y = SGXConfig.boxHeight / 2 - 0.01;
            gridCeil.rotation.x = Math.PI;
            scene.add(gridCeil);

            // Re-escalar modelo principal si ya está cargado
            scaleMainObject();
        }

        buildEncasedRoom();

        // ==========================================
        // 3. CARGA DEL MODELO 3D (Asset)
        // ==========================================
        const modelUrl = 'https://static.wixstatic.com/3d/fe81a7_8d5fdc7130e14daa8e101d7569c59b37.glb';
        let mainObject;
        let originalModelSize = new THREE.Vector3();

        function scaleMainObject() {
            if (!mainObject) return;
            const maxDim = Math.max(originalModelSize.x, originalModelSize.y, originalModelSize.z);
            // Escala para que ocupe siempre el 60% de la altura de la caja actual
            const scale = (SGXConfig.boxHeight * 0.6) / maxDim; 
            mainObject.scale.set(scale, scale, scale);
        }

        const loader = new THREE.GLTFLoader();
        loader.load(
            modelUrl,
            (gltf) => {
                mainObject = gltf.scene;
                
                // Auto-centrado
                const box = new THREE.Box3().setFromObject(mainObject);
                const center = box.getCenter(new THREE.Vector3());
                box.getSize(originalModelSize);
                
                mainObject.position.sub(center); // Centrar en (0,0,0)
                scaleMainObject(); // Escalar según la caja
                
                scene.add(mainObject);
            }
        );

        // ==========================================
        // 4. LÓGICA DE TRACKING Y LERP
        // ==========================================
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;

        function lerp(start, end, amt) {
            return (1 - amt) * start + amt * end;
        }

        // ==========================================
        // 5. SISTEMA DE UI INTERACTIVO (LIL-GUI)
        // ==========================================
        function initGUI() {
            const gui = new lil.GUI({ title: '⚙️ SGX Control Panel' });
            document.querySelector('.lil-gui').style.display = 'block';

            // Carpeta: Sensor y Parallax
            const folderParallax = gui.addFolder('👁️ Parallax Engine');
            folderParallax.add(SGXConfig, 'tipoParallax', ['Portal (Físico)', 'Espejo (Sigue Mirada)']).name('Modo de Interacción');
            folderParallax.add(SGXConfig, 'depthMultiplierX', 0, 10).name('Amplitud X');
            folderParallax.add(SGXConfig, 'depthMultiplierY', 0, 10).name('Amplitud Y');
            folderParallax.add(SGXConfig, 'lerpFactor', 0.01, 0.5).name('Fricción (Lerp)');
            folderParallax.add(SGXConfig, 'invertX').name('Invertir Eje X Base');
            folderParallax.add(SGXConfig, 'invertY').name('Invertir Eje Y Base');
            folderParallax.add(SGXConfig, 'resetView').name('Resetear Vista');

            // Carpeta: Geometría de la Caja
            const folderBox = gui.addFolder('📐 Spatial Boundary');
            folderBox.add(SGXConfig, 'boxWidth', 2, 30).name('Ancho (X)').onChange(buildEncasedRoom);
            folderBox.add(SGXConfig, 'boxHeight', 2, 20).name('Altura (Y)').onChange(buildEncasedRoom);
            folderBox.add(SGXConfig, 'boxDepth', 2, 30).name('Profundidad (Z)').onChange(buildEncasedRoom);

            // Carpeta: Entorno
            const folderEnv = gui.addFolder('💡 Environment');
            folderEnv.add(SGXConfig, 'cameraZ', 2, 20).name('Distancia Cámara').onChange(v => camera.position.z = v);
            folderEnv.add(SGXConfig, 'lightIntensity', 0, 3).name('Luz Global').onChange(v => {
                hemiLight.intensity = v;
                dirLight.intensity = v;
            });

            // Cerrar algunas carpetas por defecto para no saturar
            folderEnv.close();
        }

        // ==========================================
        // 6. INICIALIZACIÓN IA Y MEDIA (PERMISOS)
        // ==========================================
        const videoElement = document.getElementById('input_video');
        const startBtn = document.getElementById('start-btn');
        const uiLayer = document.getElementById('ui-layer');
        const loadingMsg = document.getElementById('loading-msg');
        const hudData = document.getElementById('hud-data');

        let cameraUtilsInstance = null;
        let isSystemInitialized = false; // Candado de memoria

        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: false,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        faceMesh.onResults((results) => {
            // Desbloqueo seguro: Quita UI de carga e instancia GUI una sola vez
            if (!isSystemInitialized) {
                isSystemInitialized = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => { uiLayer.style.display = 'none'; }, 500);
                hudData.style.display = 'block';
                initGUI(); 
            }

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const nose = results.multiFaceLandmarks[0][1];
                
                // Normalización con aplicadores paramétricos base
                let dirX = SGXConfig.invertX ? -1 : 1;
                let dirY = SGXConfig.invertY ? -1 : 1;

                // Aplicador del Modo de Interacción
                let modeMultiplier = SGXConfig.tipoParallax === 'Portal (Físico)' ? 1 : -1;

                targetX = (nose.x - 0.5) * 2 * SGXConfig.depthMultiplierX * dirX * modeMultiplier; 
                targetY = (nose.y - 0.5) * 2 * SGXConfig.depthMultiplierY * dirY * modeMultiplier; 

                hudData.innerText = `TARGET X: ${targetX.toFixed(2)} | TARGET Y: ${targetY.toFixed(2)}`;
            }
        });

        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            loadingMsg.style.display = 'block';

            cameraUtilsInstance = new Camera(videoElement, {
                onFrame: async () => {
                    await faceMesh.send({image: videoElement});
                },
                width: 640,
                height: 480
            });

            cameraUtilsInstance.start().catch(err => {
                loadingMsg.innerText = "Error: Acceso a cámara denegado. Revisa tus permisos de navegador.";
                loadingMsg.style.color = "red";
            });
        });

        // ==========================================
        // 7. RENDER LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // Filtro LERP dinámico
            currentX = lerp(currentX, targetX, SGXConfig.lerpFactor);
            currentY = lerp(currentY, targetY, SGXConfig.lerpFactor);

            // Aplicar traslación a la cámara
            camera.position.x = currentX;
            camera.position.y = currentY;
            
            // Siempre mirar al centro del mundo
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        animate();

        // ==========================================
        // 8. RESPONSIVIDAD
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
