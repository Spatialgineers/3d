<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX - Spatial Encased Portal</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050505; 
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #video_feed { 
            display: none; 
            /* El video se mantiene oculto, solo sirve para inyectarle datos a la IA */
        }
        
        /* UI Layer - Viñeta transparente para ver el 3D operando detrás */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(5,5,5,0.4) 0%, rgba(5,5,5,0.9) 100%);
            color: #FDCC0D; /* SGX Yellow */
            z-index: 20;
            transition: opacity 0.5s ease;
            backdrop-filter: blur(2px);
        }
        .start-box {
            background: rgba(50, 82, 123, 0.85); /* SGX Blue */
            border: 2px solid #FDCC0D;
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(253, 204, 13, 0.3);
            max-width: 450px;
        }
        button.sgx-btn {
            background: #FDCC0D;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }
        button.sgx-btn:hover {
            background: #fff;
            box-shadow: 0 0 20px #FDCC0D;
            transform: scale(1.05);
        }
        #system-log {
            color: #fff;
            margin-top: 20px;
            font-size: 0.85rem;
            min-height: 20px;
        }
        #hud-data {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #FDCC0D;
            font-size: 0.8rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        /* Lil-GUI SGX Custom Theme */
        .lil-gui { 
            --background-color: rgba(17, 17, 17, 0.95);
            --text-color: #FDCC0D;
            --title-background-color: #32527B;
            --widget-color: #333;
            --hover-color: #444;
            --focus-color: #FDCC0D;
            --number-color: #fff;
            --string-color: #fff;
            font-family: 'Courier New', Courier, monospace;
            z-index: 15;
            position: absolute;
            top: 10px;
            right: 10px;
            display: none;
        }
    </style>

    <!-- 1. Librerías Base -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>
</head>
<body>

    <!-- Atributos críticos para WebRTC: autoplay, playsinline, muted -->
    <video id="video_feed" autoplay playsinline muted></video>
    
    <div id="scene-container"></div>

    <div id="ui-layer">
        <div class="start-box">
            <h2 style="margin-top:0;">SGX SPATIAL PORTAL</h2>
            <p style="color: #ddd; font-size: 0.95rem; line-height: 1.4;">
                Validador Arquitectónico de Parallax.<br>
                Requiere acceso a la cámara para cálculo de profundidad espacial.
            </p>
            <button id="start-btn" class="sgx-btn">Iniciar Motor Óptico</button>
            <div id="system-log">SISTEMA EN ESPERA...</div>
        </div>
    </div>
    
    <div id="hud-data">X: 0.00 | Y: 0.00 | LERP: ACTIVO</div>

    <script>
        // ==========================================
        // 0. CONFIGURACIÓN MAESTRA SGX (ESTADO GLOBAL)
        // ==========================================
        const SGX = {
            // Variables Matemáticas del Parallax
            targetX: 0,
            targetY: 0,
            currentX: 0,
            currentY: 0,

            // Parámetros Expuestos al UI
            config: {
                modo: 'Portal (Efecto Vitrina)', // vs 'Espejo (Sigue Mirada)'
                amplitudX: 4.5,
                amplitudY: 3.0,
                friccion: 0.1,    // Factor Lerp
                invertirX: false, // Corección de cámara
                invertirY: false,
                
                // Entorno
                boxW: 12,
                boxH: 8,
                boxD: 8,
                camZ: 9,
                
                // Botón de reset
                recalibrar: function() {
                    SGX.targetX = 0; SGX.targetY = 0;
                    SGX.currentX = 0; SGX.currentY = 0;
                }
            }
        };

        const logger = document.getElementById('system-log');

        // ==========================================
        // 1. MOTOR GRÁFICO (THREE.JS CORE)
        // ==========================================
        const container = document.getElementById('scene-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = SGX.config.camZ;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // Iluminación
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.9);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // ==========================================
        // 2. CONSTRUCCIÓN DE LA VITRINA (BOUNDARY BOX)
        // ==========================================
        let room, gridFloor, gridCeil;

        function buildSpatialBox() {
            // Destrucción limpia para evitar memory leaks
            if (room) { room.geometry.dispose(); room.material.dispose(); scene.remove(room); }
            if (gridFloor) scene.remove(gridFloor);
            if (gridCeil) scene.remove(gridCeil);

            // Construir paredes
            const roomGeo = new THREE.BoxGeometry(SGX.config.boxW, SGX.config.boxH, SGX.config.boxD);
            const roomMat = new THREE.MeshStandardMaterial({
                color: 0x151515,
                side: THREE.BackSide,
                roughness: 0.7,
                metalness: 0.3
            });
            room = new THREE.Mesh(roomGeo, roomMat);
            scene.add(room);

            // Construir rejillas de perspectiva (Amarillo y Azul SGX)
            gridFloor = new THREE.GridHelper(SGX.config.boxW, Math.floor(SGX.config.boxW * 2), 0xFDCC0D, 0x32527B);
            gridFloor.position.y = -SGX.config.boxH / 2 + 0.01; 
            scene.add(gridFloor);

            gridCeil = new THREE.GridHelper(SGX.config.boxW, Math.floor(SGX.config.boxW * 2), 0xFDCC0D, 0x32527B);
            gridCeil.position.y = SGX.config.boxH / 2 - 0.01;
            gridCeil.rotation.x = Math.PI;
            scene.add(gridCeil);

            // Reescalar la molécula si ya existe
            scaleModelToBox();
        }

        buildSpatialBox(); // Ejecutar 1ra vez

        // ==========================================
        // 3. CARGA DEL ASSET (LA MOLÉCULA GLB)
        // ==========================================
        const modelUrl = 'https://static.wixstatic.com/3d/fe81a7_8d5fdc7130e14daa8e101d7569c59b37.glb';
        let mainModel;
        let originalBoundingBoxSize = new THREE.Vector3();

        function scaleModelToBox() {
            if (!mainModel) return;
            // Calcular la escala para que siempre ocupe el 60% de la altura de la caja
            const maxDim = Math.max(originalBoundingBoxSize.x, originalBoundingBoxSize.y, originalBoundingBoxSize.z);
            const scaleTarget = (SGX.config.boxH * 0.6) / maxDim; 
            mainModel.scale.set(scaleTarget, scaleTarget, scaleTarget);
        }

        const loader = new THREE.GLTFLoader();
        loader.load(modelUrl, (gltf) => {
            mainModel = gltf.scene;
            
            // Lógica estricta de auto-centrado
            const box = new THREE.Box3().setFromObject(mainModel);
            const center = box.getCenter(new THREE.Vector3());
            box.getSize(originalBoundingBoxSize);
            
            mainModel.position.sub(center); // Centrar en el origen absoluto (0,0,0)
            scaleModelToBox(); 
            scene.add(mainModel);
        });

        // ==========================================
        // 4. BUCLE DE RENDER Y LERP (Siempre Activo)
        // ==========================================
        function lerp(start, end, amt) {
            return (1 - amt) * start + amt * end;
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);

            // Rotación pasiva lenta para dar sensación de vida
            if (mainModel) mainModel.rotation.y += 0.003;

            // Interpolación matemática (Filtro de fricción)
            SGX.currentX = lerp(SGX.currentX, SGX.targetX, SGX.config.friccion);
            SGX.currentY = lerp(SGX.currentY, SGX.targetY, SGX.config.friccion);

            // Actualizar cámara
            camera.position.x = SGX.currentX;
            camera.position.y = SGX.currentY;
            camera.lookAt(0, 0, 0); // Anclaje visual forzado al centro

            renderer.render(scene, camera);
        }

        renderLoop(); // Iniciar render inmediatamente (independiente de la IA)

        // ==========================================
        // 5. SISTEMA DE CONTROLES (LIL-GUI)
        // ==========================================
        function initializeControlPanel() {
            const gui = new lil.GUI({ title: '⚙️ SGX Arquitectura' });
            document.querySelector('.lil-gui').style.display = 'block';

            const folderIA = gui.addFolder('👁️ Motor de Parallax');
            folderIA.add(SGX.config, 'modo', ['Portal (Efecto Vitrina)', 'Espejo (Sigue Mirada)']).name('Física Base');
            folderIA.add(SGX.config, 'amplitudX', 0, 15).name('Multiplicador X');
            folderIA.add(SGX.config, 'amplitudY', 0, 15).name('Multiplicador Y');
            folderIA.add(SGX.config, 'friccion', 0.01, 0.4).name('Fricción (Lerp)');
            folderIA.add(SGX.config, 'invertirX').name('Espejar Eje X');
            folderIA.add(SGX.config, 'invertirY').name('Espejar Eje Y');
            folderIA.add(SGX.config, 'recalibrar').name('Forzar Centro');

            const folderGeo = gui.addFolder('📐 Vitrina Espacial (Boundary)');
            // onFinishChange se asegura de que solo se reconstruya la caja al soltar el ratón (Salva la RAM)
            folderGeo.add(SGX.config, 'boxW', 5, 40).name('Ancho').onFinishChange(buildSpatialBox);
            folderGeo.add(SGX.config, 'boxH', 5, 20).name('Alto').onFinishChange(buildSpatialBox);
            folderGeo.add(SGX.config, 'boxD', 5, 30).name('Profundidad').onFinishChange(buildSpatialBox);
            
            folderGeo.add(SGX.config, 'camZ', 2, 20).name('Distancia Espectador').onChange(v => camera.position.z = v);
        }

        // ==========================================
        // 6. FLUJO DE IA Y HARDWARE (SECUENCIA BLINDADA)
        // ==========================================
        const startBtn = document.getElementById('start-btn');
        const uiLayer = document.getElementById('ui-layer');
        const videoEl = document.getElementById('video_feed');
        const hud = document.getElementById('hud-data');

        let isAppRunning = false;

        // Configuración de la Red Neuronal
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});
        
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: false,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        // Cerebro de la IA (Se ejecuta cada vez que lee un rostro)
        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const nose = results.multiFaceLandmarks[0][1]; // Landmark 1: Punta de la nariz
                
                // 1. Normalizar de [0, 1] a [-1, 1]
                let normX = (nose.x - 0.5) * 2;
                let normY = (nose.y - 0.5) * 2;

                // 2. Aplicar correctores
                let multX = SGX.config.invertirX ? -1 : 1;
                let multY = SGX.config.invertirY ? -1 : 1;
                let modo = SGX.config.modo === 'Portal (Efecto Vitrina)' ? -1 : 1; // El portal invierte el movimiento

                // 3. Asignar target final
                SGX.targetX = normX * SGX.config.amplitudX * multX * modo;
                SGX.targetY = normY * SGX.config.amplitudY * multY * modo;

                hud.innerText = `X: ${SGX.targetX.toFixed(2)} | Y: ${SGX.targetY.toFixed(2)}`;
            }
        });

        // Bucle continuo de envío de frames del video a la IA
        async function processVideoFrame() {
            if (!videoEl.paused && !videoEl.ended) {
                try {
                    await faceMesh.send({image: videoEl});
                } catch (e) {
                    // Silenciar errores minúsculos de procesamiento de frame
                }
            }
            requestAnimationFrame(processVideoFrame);
        }

        // EL TRIGGER (El botón que inicia todo el evento)
        startBtn.addEventListener('click', async () => {
            if (isAppRunning) return;
            
            startBtn.style.display = 'none';
            logger.innerText = "SOLICITANDO ACCESO AL HARDWARE...";
            logger.style.color = "#FDCC0D";

            try {
                // 1. Solicitar cámara cruda al navegador (Forzar Prompt)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480, facingMode: "user" } 
                });
                
                // 2. Inyectar video
                videoEl.srcObject = stream;
                
                videoEl.onloadedmetadata = async () => {
                    videoEl.play();
                    logger.innerText = "CÁMARA CONECTADA. DESPERTANDO RED NEURONAL...";
                    
                    try {
                        // 3. Inicializar IA obligatoriamente ANTES de enviar frames
                        await faceMesh.initialize();
                        
                        // 4. Limpieza de UI e inicio de la magia
                        isAppRunning = true;
                        uiLayer.style.opacity = '0';
                        setTimeout(() => { uiLayer.style.display = 'none'; }, 500);
                        
                        hud.style.display = 'block';
                        initializeControlPanel();
                        
                        // 5. Arrancar bucle de inyección
                        processVideoFrame();

                    } catch (aiError) {
                        logger.innerText = "FALLO DESCARGANDO IA (REVISA CONEXIÓN A INTERNET O CDN).";
                        logger.style.color = "#ff4444";
                        console.error(aiError);
                    }
                };

            } catch (cameraError) {
                logger.innerText = "ACCESO DENEGADO A LA CÁMARA O HARDWARE NO DETECTADO.";
                logger.style.color = "#ff4444";
                console.error(cameraError);
            }
        });

        // ==========================================
        // 7. EVENTOS DE VENTANA
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
