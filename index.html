<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX - Spatial Encased Portal</title>
    <style>
        :root {
            --sgx-yellow: #FDCC0D;
            --sgx-blue: #32527B;
            --sgx-bg: #050505;
            --glass: rgba(50, 82, 123, 0.4);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            background: var(--sgx-bg);
            font-family: 'Courier New', Courier, monospace;
            color: var(--sgx-yellow);
            touch-action: none;
        }

        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #webcam_feed { 
            display: none; 
        }
        
        /* UI Layer - Glassmorphism Premium */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            z-index: 20;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
        }

        .sgx-panel {
            background: var(--glass);
            border: 1px solid rgba(253, 204, 13, 0.3);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 90%;
            width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 30px rgba(253, 204, 13, 0.1);
        }

        .sgx-panel h1 {
            margin: 0 0 10px 0;
            font-size: 2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 900;
        }

        .sgx-panel p {
            color: #bdc3c7;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        button.sgx-btn {
            background: var(--sgx-yellow);
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 1rem;
            font-weight: 900;
            font-family: inherit;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(253, 204, 13, 0.2);
            width: 100%;
            margin-bottom: 10px;
        }

        button.sgx-btn:hover {
            background: #fff;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(253, 204, 13, 0.4);
        }

        button.secondary-btn {
            background: transparent;
            color: var(--sgx-yellow);
            border: 1px solid var(--sgx-yellow);
            padding: 12px;
            font-size: 0.8rem;
            width: 100%;
            cursor: pointer;
            border-radius: 8px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        #log-console {
            margin-top: 25px;
            font-size: 0.75rem;
            min-height: 40px;
            color: #999;
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid var(--sgx-yellow);
            text-align: left;
            word-wrap: break-word;
            font-family: 'Consolas', monospace;
        }

        #hud {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(10, 20, 35, 0.85);
            border: 1px solid var(--sgx-yellow);
            padding: 15px 20px;
            border-radius: 8px;
            font-size: 0.75rem;
            z-index: 10;
            display: none;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            line-height: 1.8;
        }

        .lil-gui { 
            --background-color: rgba(15, 20, 30, 0.98);
            --text-color: var(--sgx-yellow);
            --title-background-color: var(--sgx-blue);
            --widget-color: #333;
            --hover-color: #444;
            --focus-color: var(--sgx-yellow);
            font-family: 'Courier New', Courier, monospace !important;
            z-index: 25;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .sgx-panel { padding: 25px; }
            .lil-gui { width: 100% !important; max-width: 280px; }
            #hud { bottom: 10px; left: 10px; font-size: 0.65rem; }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>
</head>
<body>

    <video id="webcam_feed" autoplay playsinline muted></video>
    
    <div id="scene-container"></div>

    <div id="ui-layer">
        <div class="sgx-panel">
            <h1>SGX ENGINE</h1>
            <p>Spatial Parallax Validator v2.5<br>Enlaza tu sensor óptico para activar el tracking de profundidad IA o continúa en modo simulación manual.</p>
            <button id="btn-start" class="sgx-btn">ENLAZAR SENSOR ÓPTICO</button>
            <button id="btn-manual" class="secondary-btn">MODO MANUAL (CURSOR)</button>
            <div id="log-console">SISTEMA: Iniciado. Esperando handshake...</div>
        </div>
    </div>
    
    <div id="hud">
        <strong style="color:white">SISTEMA DE SEGUIMIENTO</strong><br>
        MODO: <span id="hud-mode">IDLE</span><br>
        COORD_X: <span id="hud-x">0.00</span><br>
        COORD_Y: <span id="hud-y">0.00</span>
    </div>

    <script>
        /**
         * SGX SPATIAL ENGINE - CORE LOGIC
         */
        const SGX = {
            targetCamX: 0,
            targetCamY: 0,
            currentCamX: 0,
            currentCamY: 0,
            trackingMode: 'Mouse/Touch',
            
            config: {
                modo: 'Portal (Físico)',
                amplitudX: 5.5,
                amplitudY: 4.5,
                suavizado: 0.08,
                invertirX: false,
                invertirY: false,
                boxWidth: 15,
                boxHeight: 10,
                boxDepth: 12,
                camDistance: 12,
                showGrid: true,
                reset: () => {
                    SGX.targetCamX = 0; SGX.targetCamY = 0;
                    SGX.currentCamX = 0; SGX.currentCamY = 0;
                }
            }
        };

        const logger = document.getElementById('log-console');
        function log(msg, isError = false) {
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            logger.innerText = `[${time}] > ${msg}`;
            logger.style.color = isError ? '#FF5555' : '#FDCC0D';
            if (isError) console.error(msg);
        }

        // --- THREE.JS ENGINE ---
        const container = document.getElementById('scene-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const pLight = new THREE.PointLight(0xFDCC0D, 1.5, 30);
        pLight.position.set(2, 4, 5);
        scene.add(pLight);
        
        const topLight = new THREE.DirectionalLight(0x32527B, 1);
        topLight.position.set(0, 10, 0);
        scene.add(topLight);

        // --- ROOM CONSTRUCTION ---
        let encasingBox, gridFloor, gridCeil, gridWall;

        function buildEncasing() {
            if (encasingBox) scene.remove(encasingBox);
            if (gridFloor) scene.remove(gridFloor);
            if (gridCeil) scene.remove(gridCeil);
            if (gridWall) scene.remove(gridWall);

            const boxGeo = new THREE.BoxGeometry(SGX.config.boxWidth, SGX.config.boxHeight, SGX.config.boxDepth);
            const boxMat = new THREE.MeshStandardMaterial({
                color: 0x08080a,
                side: THREE.BackSide,
                roughness: 0.8,
                metalness: 0.2
            });
            encasingBox = new THREE.Mesh(boxGeo, boxMat);
            scene.add(encasingBox);

            if (SGX.config.showGrid) {
                const step = 15;
                gridFloor = new THREE.GridHelper(SGX.config.boxWidth, step, 0xFDCC0D, 0x111111);
                gridFloor.position.y = -SGX.config.boxHeight / 2 + 0.01;
                scene.add(gridFloor);

                gridCeil = new THREE.GridHelper(SGX.config.boxWidth, step, 0x32527B, 0x111111);
                gridCeil.position.y = SGX.config.boxHeight / 2 - 0.01;
                gridCeil.rotation.x = Math.PI;
                scene.add(gridCeil);

                gridWall = new THREE.GridHelper(SGX.config.boxHeight, step, 0xFDCC0D, 0x111111);
                gridWall.position.z = -SGX.config.boxDepth / 2 + 0.01;
                gridWall.rotation.x = Math.PI / 2;
                scene.add(gridWall);
            }

            if (loadedModel) scaleAndPositionModel();
        }

        // --- ASSET LOADER ---
        const gltfLoader = new THREE.GLTFLoader();
        let loadedModel = null;
        let modelSize = new THREE.Vector3();

        function scaleAndPositionModel() {
            if (!loadedModel) return;
            const box = new THREE.Box3().setFromObject(loadedModel);
            box.getSize(modelSize);
            const maxDim = Math.max(modelSize.x, modelSize.y, modelSize.z);
            const scale = (SGX.config.boxHeight * 0.5) / maxDim;
            loadedModel.scale.set(scale, scale, scale);
            loadedModel.position.set(0, 0, 0); 
        }

        gltfLoader.load(
            'https://static.wixstatic.com/3d/fe81a7_8d5fdc7130e14daa8e101d7569c59b37.glb',
            (gltf) => {
                loadedModel = gltf.scene;
                // Center model pivot
                const box = new THREE.Box3().setFromObject(loadedModel);
                const center = box.getCenter(new THREE.Vector3());
                loadedModel.position.sub(center);
                
                const wrapper = new THREE.Group();
                wrapper.add(loadedModel);
                scene.add(wrapper);
                loadedModel = wrapper;

                scaleAndPositionModel();
                log("Geometría SGX cargada y optimizada.");
            },
            undefined,
            () => log("Error cargando Asset. Usando fallback.", true)
        );

        buildEncasing();

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (loadedModel) {
                loadedModel.rotation.y += 0.005;
                loadedModel.position.y = Math.sin(Date.now() * 0.002) * 0.3;
            }

            // Smooth damping
            SGX.currentCamX += (SGX.targetCamX - SGX.currentCamX) * SGX.config.suavizado;
            SGX.currentCamY += (SGX.targetCamY - SGX.currentCamY) * SGX.config.suavizado;

            camera.position.x = SGX.currentCamX;
            camera.position.y = SGX.currentCamY;
            camera.position.z = SGX.config.camDistance;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }
        animate();

        // --- CONTROLS & UI ---
        function initGUI() {
            const gui = new lil.GUI({ title: 'SGX CONTROL MATRIX' });
            
            const p = gui.addFolder('👁️ Percepción Parallax');
            p.add(SGX.config, 'modo', ['Portal (Físico)', 'Espejo (Sigue Mirada)']);
            p.add(SGX.config, 'amplitudX', 1, 15).name('Amplitud X');
            p.add(SGX.config, 'amplitudY', 1, 15).name('Amplitud Y');
            p.add(SGX.config, 'suavizado', 0.01, 0.3).name('Inercia');
            p.add(SGX.config, 'invertirX').name('Invertir X');
            p.add(SGX.config, 'invertirY').name('Invertir Y');
            
            const s = gui.addFolder('📐 Parámetros Espaciales');
            s.add(SGX.config, 'boxWidth', 5, 40).name('Ancho').onChange(buildEncasing);
            s.add(SGX.config, 'boxHeight', 5, 25).name('Alto').onChange(buildEncasing);
            s.add(SGX.config, 'boxDepth', 5, 40).name('Profundidad').onChange(buildEncasing);
            s.add(SGX.config, 'camDistance', 5, 30).name('Distancia Z');
            s.add(SGX.config, 'showGrid').name('Mostrar Rejilla').onChange(buildEncasing);
            
            gui.add(SGX.config, 'reset').name('Recalibrar');
        }

        // --- MOUSE TRACKING (FALLBACK) ---
        window.addEventListener('pointermove', (e) => {
            if (SGX.trackingMode !== 'Mouse/Touch') return;
            
            const nx = (e.clientX / window.innerWidth - 0.5) * 2;
            const ny = (e.clientY / window.innerHeight - 0.5) * 2;
            
            updateTarget(nx, ny);
        });

        function updateTarget(nx, ny) {
            const dirX = SGX.config.invertirX ? -1 : 1;
            const dirY = SGX.config.invertirY ? -1 : 1;
            const logic = SGX.config.modo === 'Portal (Físico)' ? -1 : 1;

            SGX.targetCamX = nx * SGX.config.amplitudX * dirX * logic;
            SGX.targetCamY = -ny * SGX.config.amplitudY * dirY * logic;

            document.getElementById('hud-x').innerText = SGX.targetCamX.toFixed(2);
            document.getElementById('hud-y').innerText = SGX.targetCamY.toFixed(2);
        }

        // --- IA FACE TRACKING ---
        const videoElement = document.getElementById('webcam_feed');
        const btnStart = document.getElementById('btn-start');
        const btnManual = document.getElementById('btn-manual');

        const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: false, minDetectionConfidence: 0.6 });

        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const nose = results.multiFaceLandmarks[0][1]; 
                updateTarget((nose.x - 0.5) * 2, (nose.y - 0.5) * 2);
            }
        });

        async function cameraLoop() {
            if (SGX.trackingMode === 'Face AI') {
                await faceMesh.send({image: videoElement});
                requestAnimationFrame(cameraLoop);
            }
        }

        function hideUI() {
            const ui = document.getElementById('ui-layer');
            ui.style.opacity = '0';
            setTimeout(() => {
                ui.style.visibility = 'hidden';
                document.getElementById('hud').style.display = 'block';
                document.getElementById('hud-mode').innerText = SGX.trackingMode;
                initGUI();
            }, 600);
        }

        btnManual.addEventListener('click', () => {
            SGX.trackingMode = 'Mouse/Touch';
            log("Iniciando en modo manual...");
            hideUI();
        });

        btnStart.addEventListener('click', async () => {
            log("Solicitando acceso a sensor óptico...");
            btnStart.disabled = true;
            btnStart.innerText = "CONECTANDO...";

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480 } 
                });
                
                videoElement.srcObject = stream;
                videoElement.onloadedmetadata = () => {
                    videoElement.play();
                    SGX.trackingMode = 'Face AI';
                    log("Sensor activo. Inicializando redes neuronales...");
                    cameraLoop();
                    hideUI();
                };
            } catch (err) {
                log("Error de hardware: " + err.message, true);
                btnStart.innerText = "ERROR DE ACCESO";
                setTimeout(() => {
                    btnStart.disabled = false;
                    btnStart.innerText = "REINTENTAR ENLACE";
                }, 2000);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
