<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX - Spatial Encased Portal</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050505; /* Fondo oscuro SGX */
            font-family: 'Courier New', Courier, monospace;
            color: #FDCC0D;
        }
        canvas { 
            display: block; 
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #webcam_feed { 
            display: none; /* Sensor oculto */
        }
        
        /* UI Layer - Glassmorphism Premium */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10, 15, 25, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 20;
            transition: opacity 0.5s ease, visibility 0.5s;
        }
        .sgx-panel {
            background: rgba(50, 82, 123, 0.4); /* SGX Blue con opacidad */
            border: 1px solid rgba(253, 204, 13, 0.5); /* Borde SGX Yellow */
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8), 0 0 20px rgba(253, 204, 13, 0.2);
        }
        .sgx-panel h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .sgx-panel p {
            color: #ccc;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        button.sgx-btn {
            background: #FDCC0D;
            color: #050505;
            border: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            border-radius: 6px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(253, 204, 13, 0.3);
        }
        button.sgx-btn:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(253, 204, 13, 0.6);
        }
        button.sgx-btn:active {
            transform: translateY(1px);
        }
        
        #log-console {
            margin-top: 25px;
            font-size: 0.85rem;
            min-height: 40px;
            color: #aaa;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 4px;
            border-left: 3px solid #FDCC0D;
            text-align: left;
            word-wrap: break-word;
        }

        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(50, 82, 123, 0.8);
            border: 1px solid #FDCC0D;
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 0.8rem;
            z-index: 10;
            display: none;
            pointer-events: none;
        }

        /* Lil-GUI Custom Theme */
        .lil-gui { 
            --background-color: rgba(20, 25, 35, 0.95);
            --text-color: #FDCC0D;
            --title-background-color: #32527B;
            --widget-color: #444;
            --hover-color: #555;
            --focus-color: #FDCC0D;
            font-family: 'Courier New', Courier, monospace;
            z-index: 15;
            position: absolute;
            top: 15px;
            right: 15px;
        }
    </style>

    <!-- Librerías desde CDNs robustos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19"></script>
</head>
<body>

    <!-- Sensor Óptico (Estrictamente Muted para Autoplay) -->
    <video id="webcam_feed" autoplay playsinline muted></video>
    
    <!-- Render 3D -->
    <div id="scene-container"></div>

    <!-- Interfaz Transparente -->
    <div id="ui-layer">
        <div class="sgx-panel">
            <h1>SGX.Showcase</h1>
            <p>Validador Arquitectónico de Parallax.<br>El motor 3D está corriendo. Presiona el botón para enlazar tu cámara y activar la percepción de profundidad.</p>
            <button id="btn-start" class="sgx-btn">ENLAZAR SENSOR ÓPTICO</button>
            <div id="log-console">ESTADO: Esperando comando de inicio...</div>
        </div>
    </div>
    
    <div id="hud">
        COORDENADAS IA<br>
        <span id="hud-x">X: 0.00</span> | <span id="hud-y">Y: 0.00</span>
    </div>

    <script>
        // ==========================================
        // 0. ESTADO GLOBAL (SINGLE SOURCE OF TRUTH)
        // ==========================================
        const SGX = {
            targetCamX: 0,
            targetCamY: 0,
            currentCamX: 0,
            currentCamY: 0,
            
            // UI Config Expose
            config: {
                modo: 'Portal (Físico)',
                amplitudX: 4.5,
                amplitudY: 3.5,
                suavizado: 0.1, // Lerp factor
                invertirX: false,
                invertirY: false,
                boxWidth: 15,
                boxHeight: 10,
                boxDepth: 10,
                camDistance: 10,
                reset: () => {
                    SGX.targetCamX = 0; SGX.targetCamY = 0;
                    SGX.currentCamX = 0; SGX.currentCamY = 0;
                }
            }
        };

        const logger = document.getElementById('log-console');
        function log(msg, isError = false) {
            logger.innerText = `> ${msg}`;
            logger.style.color = isError ? '#FF5555' : '#FDCC0D';
            if (isError) console.error(msg);
        }

        // ==========================================
        // 1. MOTOR 3D (RENDERIZA INMEDIATAMENTE)
        // ==========================================
        const container = document.getElementById('scene-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = SGX.config.camDistance;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // Iluminación Premium
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 8);
        scene.add(dirLight);
        
        const blueRimLight = new THREE.PointLight(0x32527B, 2, 50);
        blueRimLight.position.set(-5, -5, -5);
        scene.add(blueRimLight);

        // ==========================================
        // 2. CONSTRUCCIÓN DEL BOUNDARY (LA VITRINA)
        // ==========================================
        let encasingBox, gridFloor, gridCeil;

        function buildEncasing() {
            // Limpieza de memoria RAM
            if (encasingBox) { scene.remove(encasingBox); encasingBox.geometry.dispose(); }
            if (gridFloor) scene.remove(gridFloor);
            if (gridCeil) scene.remove(gridCeil);

            // Muros oscuros
            const boxGeo = new THREE.BoxGeometry(SGX.config.boxWidth, SGX.config.boxHeight, SGX.config.boxDepth);
            const boxMat = new THREE.MeshStandardMaterial({
                color: 0x0a0a0a,
                side: THREE.BackSide,
                roughness: 0.9
            });
            encasingBox = new THREE.Mesh(boxGeo, boxMat);
            scene.add(encasingBox);

            // Grids para forzar perspectiva (Crucial para el Parallax)
            gridFloor = new THREE.GridHelper(Math.max(SGX.config.boxWidth, SGX.config.boxDepth), 20, 0xFDCC0D, 0x32527B);
            gridFloor.position.y = -SGX.config.boxHeight / 2 + 0.05;
            scene.add(gridFloor);

            gridCeil = new THREE.GridHelper(Math.max(SGX.config.boxWidth, SGX.config.boxDepth), 20, 0xFDCC0D, 0x32527B);
            gridCeil.position.y = SGX.config.boxHeight / 2 - 0.05;
            gridCeil.rotation.x = Math.PI;
            scene.add(gridCeil);

            scaleModel();
        }

        buildEncasing();

        // ==========================================
        // 3. ASSET 3D (CARGA ASÍNCRONA)
        // ==========================================
        const gltfLoader = new THREE.GLTFLoader();
        let loadedModel = null;
        let modelBaseSize = new THREE.Vector3();

        function scaleModel() {
            if (!loadedModel) return;
            const maxDim = Math.max(modelBaseSize.x, modelBaseSize.y, modelBaseSize.z);
            // El modelo siempre ocupa el 65% de la altura de la caja para verse premium
            const targetScale = (SGX.config.boxHeight * 0.65) / maxDim;
            loadedModel.scale.set(targetScale, targetScale, targetScale);
        }

        gltfLoader.load(
            'https://static.wixstatic.com/3d/fe81a7_8d5fdc7130e14daa8e101d7569c59b37.glb',
            (gltf) => {
                loadedModel = gltf.scene;
                
                // Forzar centrado absoluto del pivote
                const boundingBox = new THREE.Box3().setFromObject(loadedModel);
                const center = boundingBox.getCenter(new THREE.Vector3());
                boundingBox.getSize(modelBaseSize);
                
                loadedModel.position.sub(center);
                scaleModel();
                scene.add(loadedModel);
                log("Motor 3D y Asset Cargados. Esperando enlace de sensor.");
            },
            undefined,
            (error) => { log("Error descargando el asset 3D desde Wix.", true); }
        );

        // ==========================================
        // 4. ANIMATION LOOP (INDEPENDIENTE)
        // ==========================================
        function lerp(start, end, amt) {
            return (1 - amt) * start + amt * end;
        }

        function animate() {
            requestAnimationFrame(animate);

            // Dar vida al modelo (rotación sutil)
            if (loadedModel) {
                loadedModel.rotation.y += 0.002;
                loadedModel.rotation.x = Math.sin(Date.now() * 0.001) * 0.1; // Float effect
            }

            // Aplicar Filtro de Fricción (Lerp) a la cámara
            SGX.currentCamX = lerp(SGX.currentCamX, SGX.targetCamX, SGX.config.suavizado);
            SGX.currentCamY = lerp(SGX.currentCamY, SGX.targetCamY, SGX.config.suavizado);

            camera.position.x = SGX.currentCamX;
            camera.position.y = SGX.currentCamY;
            camera.position.z = SGX.config.camDistance;
            
            camera.lookAt(0, 0, 0); // Ancla al centro del mundo

            renderer.render(scene, camera);
        }
        animate(); // Arranca sin esperar a la cámara

        // ==========================================
        // 5. INTERFAZ DE ARQUITECTO (LIL-GUI)
        // ==========================================
        function initControls() {
            const gui = new lil.GUI({ title: '⚙️ SGX Control Matrix' });
            
            const pFolder = gui.addFolder('👁️ Parallax Core');
            pFolder.add(SGX.config, 'modo', ['Portal (Físico)', 'Espejo (Sigue Mirada)']).name('Modo de Fuga');
            pFolder.add(SGX.config, 'amplitudX', 1, 15).name('Multiplicador X');
            pFolder.add(SGX.config, 'amplitudY', 1, 15).name('Multiplicador Y');
            pFolder.add(SGX.config, 'suavizado', 0.01, 0.5).name('Fricción');
            pFolder.add(SGX.config, 'invertirX').name('Invertir Sensor X');
            pFolder.add(SGX.config, 'invertirY').name('Invertir Sensor Y');
            pFolder.add(SGX.config, 'reset').name('Recalibrar Centro');

            const gFolder = gui.addFolder('📐 Lógica Espacial (Boundary)');
            gFolder.add(SGX.config, 'boxWidth', 5, 30).name('Ancho X').onFinishChange(buildEncasing);
            gFolder.add(SGX.config, 'boxHeight', 5, 20).name('Alto Y').onFinishChange(buildEncasing);
            gFolder.add(SGX.config, 'boxDepth', 5, 30).name('Profundidad Z').onFinishChange(buildEncasing);
            gFolder.add(SGX.config, 'camDistance', 2, 25).name('Z-Index Cámara');
        }

        // ==========================================
        // 6. MOTOR DE IA Y HARDWARE (BLINDADO)
        // ==========================================
        const videoElement = document.getElementById('webcam_feed');
        const btnStart = document.getElementById('btn-start');
        let aiInitialized = false;

        // Instanciar MediaPipe
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});
        
        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: false,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        // Callback cuando la IA encuentra una cara
        faceMesh.onResults((results) => {
            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const nose = results.multiFaceLandmarks[0][1]; // Punta de la nariz
                
                let normX = (nose.x - 0.5) * 2;
                let normY = (nose.y - 0.5) * 2;

                let dirX = SGX.config.invertirX ? -1 : 1;
                let dirY = SGX.config.invertirY ? -1 : 1;
                let physics = SGX.config.modo === 'Portal (Físico)' ? -1 : 1;

                SGX.targetCamX = normX * SGX.config.amplitudX * dirX * physics;
                SGX.targetCamY = normY * SGX.config.amplitudY * dirY * physics;

                document.getElementById('hud-x').innerText = `X: ${SGX.targetCamX.toFixed(2)}`;
                document.getElementById('hud-y').innerText = `Y: ${SGX.targetCamY.toFixed(2)}`;
            }
        });

        // Bucle recursivo para alimentar el video a la IA
        async function processVideo() {
            if (!videoElement.paused && !videoElement.ended) {
                try { await faceMesh.send({image: videoElement}); } 
                catch (e) { /* Drop silenciado de frame */ }
            }
            requestAnimationFrame(processVideo);
        }

        // CONEXIÓN WEBRTC (LA PARTE QUE FALLABA EN EL IFRAME)
        btnStart.addEventListener('click', async () => {
            log("Pidiendo permiso de hardware al navegador...");
            btnStart.style.opacity = '0.5';
            btnStart.style.pointerEvents = 'none';

            try {
                // Llamada nativa (Fuerza el Prompt)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 640, height: 480, facingMode: "user" } 
                });
                
                log("Cámara conectada. Despertando redes neuronales...");
                videoElement.srcObject = stream;
                
                videoElement.onloadedmetadata = async () => {
                    videoElement.play();
                    
                    try {
                        // Forzar inicialización limpia
                        await faceMesh.initialize();
                        
                        // Quitar UI
                        const ui = document.getElementById('ui-layer');
                        ui.style.opacity = '0';
                        setTimeout(() => ui.style.visibility = 'hidden', 500);
                        
                        document.getElementById('hud').style.display = 'block';
                        initControls();
                        
                        log("Sistemas Online.");
                        processVideo(); // Arrancar bucle
                        
                    } catch (iaError) {
                        log(`Error crítico descargando pesos de IA: ${iaError.message}`, true);
                    }
                };

            } catch (err) {
                // AQUÍ ATRAPAMOS EL ERROR DEL IFRAME
                console.error(err);
                if (err.name === 'NotAllowedError' || err.name === 'SecurityError') {
                    log("ERROR: El navegador o el iFrame bloqueó el acceso a la cámara. Solución: Copia este código, guárdalo como 'index.html' y ábrelo directamente en Chrome/Safari.", true);
                } else {
                    log(`Fallo de hardware: ${err.message}`, true);
                }
                btnStart.style.opacity = '1';
                btnStart.style.pointerEvents = 'auto';
            }
        });

        // ==========================================
        // 7. RESPONSIVIDAD
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
