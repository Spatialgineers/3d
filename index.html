<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGX - Spatial Encased Portal</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background: #050505; 
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { 
            display: block; 
        }
        #input_video { 
            display: none; 
        }
        /* UI Layer - Bloquea la interacción hasta dar clic */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            color: #FDCC0D; /* SGX Yellow */
            z-index: 20;
            backdrop-filter: blur(5px);
        }
        .start-box {
            background: rgba(50, 82, 123, 0.9); /* SGX Blue */
            border: 2px solid #FDCC0D;
            padding: 30px;
            text-align: center;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(253, 204, 13, 0.4);
            max-width: 400px;
        }
        button {
            background: #FDCC0D;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
        }
        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #FDCC0D;
        }
        #hud-data {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #FDCC0D;
            font-size: 0.8rem;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
        }
    </style>
    <!-- Three.js Base -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- MediaPipe FaceMesh -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
</head>
<body>

    <video id="input_video" autoplay playsinline></video>
    
    <div id="scene-container"></div>

    <div id="ui-layer">
        <div class="start-box">
            <h2>SGX SPATIAL PORTAL</h2>
            <p style="color: #fff; font-size: 0.9rem;">
                Esta experiencia requiere tracking facial para crear la ilusión de profundidad (Parallax 3D).
            </p>
            <button id="start-btn">INICIAR SENSOR ÓPTICO</button>
            <p id="loading-msg" style="display: none; color: #fff; margin-top: 15px; font-size: 0.8rem;">
                Cargando Asset y Motor IA...
            </p>
        </div>
    </div>
    
    <div id="hud-data" style="display: none;">TARGET X: 0.00 | TARGET Y: 0.00</div>

    <script>
        // ==========================================
        // 1. ARQUITECTURA THREE.JS
        // ==========================================
        const container = document.getElementById('scene-container');
        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // Iluminación
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.8);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // ==========================================
        // 2. LA CAJA DE CONTENCIÓN (BOUNDARY BOX)
        // ==========================================
        // VARIABLES MAESTRAS (Modifícalas aquí)
        const boxWidth = 10;
        const boxHeight = 8;
        const boxDepth = 8;

        const roomGeo = new THREE.BoxGeometry(boxWidth, boxHeight, boxDepth);
        const roomMat = new THREE.MeshStandardMaterial({
            color: 0x111111,
            side: THREE.BackSide, // Renderiza el interior
            roughness: 0.8,
            metalness: 0.2
        });
        const room = new THREE.Mesh(roomGeo, roomMat);
        scene.add(room);

        // Rejilla base (Floor Grid) para forzar las líneas de perspectiva espacial
        const gridFloor = new THREE.GridHelper(boxWidth, 20, 0xFDCC0D, 0x32527B);
        gridFloor.position.y = -boxHeight / 2 + 0.01; // Ligeramente arriba del piso para evitar Z-fighting
        scene.add(gridFloor);

        // Rejilla de techo
        const gridCeil = new THREE.GridHelper(boxWidth, 20, 0xFDCC0D, 0x32527B);
        gridCeil.position.y = boxHeight / 2 - 0.01;
        gridCeil.rotation.x = Math.PI;
        scene.add(gridCeil);

        // ==========================================
        // 3. CARGA DEL MODELO 3D (Asset)
        // ==========================================
        const modelUrl = 'https://static.wixstatic.com/3d/fe81a7_8d5fdc7130e14daa8e101d7569c59b37.glb';
        let mainObject;

        const loader = new THREE.GLTFLoader();
        loader.load(
            modelUrl,
            (gltf) => {
                mainObject = gltf.scene;
                
                // Auto-centrado
                const box = new THREE.Box3().setFromObject(mainObject);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                mainObject.position.sub(center); // Centrar en (0,0,0)
                
                // Escalar basado en la caja para que no se salga
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = (boxHeight * 0.6) / maxDim; // Ocupa el 60% de la altura de la caja
                mainObject.scale.set(scale, scale, scale);

                scene.add(mainObject);
            }
        );

        // ==========================================
        // 4. LÓGICA DE TRACKING Y LERP
        // ==========================================
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        
        // LIMITADORES DE CÁMARA (Para no salirnos de la caja)
        const depthMultiplierX = 3.5; 
        const depthMultiplierY = 2.5; 
        const lerpFactor = 0.12; 

        function lerp(start, end, amt) {
            return (1 - amt) * start + amt * end;
        }

        // ==========================================
        // 5. INICIALIZACIÓN IA Y UI (PERMISOS)
        // ==========================================
        const videoElement = document.getElementById('input_video');
        const startBtn = document.getElementById('start-btn');
        const uiLayer = document.getElementById('ui-layer');
        const loadingMsg = document.getElementById('loading-msg');
        const hudData = document.getElementById('hud-data');

        let cameraUtilsInstance = null;

        // Configuración MediaPipe
        const faceMesh = new FaceMesh({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
        }});

        faceMesh.setOptions({
            maxNumFaces: 1,
            refineLandmarks: false,
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.6
        });

        faceMesh.onResults((results) => {
            // Quitar UI cuando detecta el primer frame válido
            if (uiLayer.style.display !== 'none') {
                uiLayer.style.display = 'none';
                hudData.style.display = 'block';
            }

            if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
                const nose = results.multiFaceLandmarks[0][1];
                
                // Normalización
                targetX = (nose.x - 0.5) * -2 * depthMultiplierX; 
                targetY = -(nose.y - 0.5) * 2 * depthMultiplierY; 

                hudData.innerText = `TARGET X: ${targetX.toFixed(2)} | TARGET Y: ${targetY.toFixed(2)}`;
            }
        });

        // Trigger manual de hardware
        startBtn.addEventListener('click', () => {
            startBtn.style.display = 'none';
            loadingMsg.style.display = 'block';

            cameraUtilsInstance = new Camera(videoElement, {
                onFrame: async () => {
                    await faceMesh.send({image: videoElement});
                },
                width: 640,
                height: 480
            });

            cameraUtilsInstance.start().catch(err => {
                loadingMsg.innerText = "Error: Acceso a cámara denegado. Revisa tus permisos.";
                loadingMsg.style.color = "red";
            });
        });

        // ==========================================
        // 6. RENDER LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);

            // Filtro LERP
            currentX = lerp(currentX, targetX, lerpFactor);
            currentY = lerp(currentY, targetY, lerpFactor);

            // Aplicar traslación a la cámara
            camera.position.x = currentX;
            camera.position.y = currentY;
            
            // Siempre mirar al centro del mundo
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        animate();

        // ==========================================
        // 7. RESPONSIVIDAD
        // ==========================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
